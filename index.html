<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://cdn.n1l.ru/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://cdn.n1l.ru/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://cdn.n1l.ru/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="https://cdn.n1l.ru/favicon/site.webmanifest" />
    <title>dash.n1l.ru — Dashboard</title>
    <link href="https://cdn.n1l.ru/fonts/jetbrainsmono.css" rel="stylesheet" />
    <link href="https://cdn.n1l.ru/v1/css/reset.css" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #03050a;
        --surface-color: #0d1117;
        --primary-color: #4682dc;
        --text-main: #b8c7ff;
        --text-dim: #7085b8;
        --border-color: rgba(70, 130, 220, 0.15);
        --google-blue: #4285f4; /* Для акцентов Google */
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "JetBrains Mono", monospace;
        background: var(--bg-color);
        color: var(--text-main);
        line-height: 1.5;
      }

      /* Google-style AppBar */
      header.app-bar {
        height: 64px;
        background: var(--surface-color);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 24px;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 1.2rem;
        font-weight: 500;
      }

      .logo-icon {
        color: var(--primary-color);
        font-weight: 800;
      }

      .container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 24px;
      }

      /* Layout Grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 20px;
      }

      /* Google Cards */
      .card {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        grid-column: span 4;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: box-shadow 0.2s ease;
      }

      .card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }

      .card-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .card-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-dim);
        font-weight: 700;
      }

      .card-content {
        padding: 20px;
        flex-grow: 1;
      }

      /* Profile Section */
      .profile-hero {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .avatar-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--primary-color);
        padding: 2px;
      }

      .avatar-circle img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
      }

      /* Activity Chart */
      .chart-wrapper {
        height: 180px;
        display: flex;
        align-items: flex-end;
        gap: 4px;
        padding-top: 10px;
      }

      .bar-group {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .bar {
        width: 100%;
        background: var(--primary-color);
        border-radius: 2px 2px 0 0;
        min-height: 2px;
        opacity: 0.8;
      }

      .bar:hover {
        opacity: 1;
      }

      .bar-label {
        font-size: 0.6rem;
        margin-top: 8px;
        color: var(--text-dim);
      }

      /* Status & Lists */
      .data-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(70, 130, 220, 0.05);
      }

      .status-chip {
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 700;
      }

      .status-operational {
        background: rgba(52, 168, 83, 0.1);
        color: #34a853;
      }
      .status-error {
        background: rgba(234, 67, 53, 0.1);
        color: #ea4335;
      }

      /* Responsive */
      @media (max-width: 1100px) {
        .card {
          grid-column: span 6;
        }
      }
      @media (max-width: 700px) {
        .card {
          grid-column: span 12;
        }
        .grid {
          gap: 12px;
        }
      }

      .footer {
        margin-top: 40px;
        padding: 24px;
        border-top: 1px solid var(--border-color);
        text-align: center;
        font-size: 0.8rem;
        color: var(--text-dim);
      }
    </style>
  </head>
  <body>
    <header class="app-bar">
      <div class="logo-area"><span class="logo-icon">N></span> dash.n1l.ru</div>
    </header>

    <main class="container">
      <div class="grid" id="dashboard">
        <div style="grid-column: span 12; text-align: center; padding: 50px">
          Загрузка консоли...
        </div>
      </div>
    </main>

    <footer class="footer">
      <div id="links">
        <a
          href="https://n1l.ru"
          style="color: var(--primary-color); text-decoration: none"
          >Main</a
        >
        •
        <a
          href="https://wiki.n1l.ru"
          style="color: var(--primary-color); text-decoration: none"
          >Wiki</a
        >
      </div>
      <div style="margin-top: 8px">
        Последняя синхронизация: <span id="timestamp">--:--</span>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
